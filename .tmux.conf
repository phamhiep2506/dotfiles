set -g default-terminal "screen-256color"
set -g history-limit 10000
set -g mouse on
set-option -sg escape-time 10
set -g status-interval 1

set -g status-style bg='#282828',fg='#fe8019'
set -g status-left '#[fg='#1793d1']   '
set -g status-right '#(uptime  | cut -d " " -f 1,2)'
set -g status-justify centre
# window status
set-window-option -g window-status-style fg='#928374'
set-window-option -g window-status-current-style fg='#b8bb26'
