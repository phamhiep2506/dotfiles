env:
  TERM: xterm-256color
window:
  dynamic_padding: true
  opacity: 1
scrolling:
  history: 10000
mouse:
  hide_when_typing: true
font:
  normal:
    family: JetBrains Mono
    style: Regular
  bold:
    family: JetBrains Mono
    style: Bold
  italic:
    family: JetBrains Mono
    style: Italic
  bold_italic:
    family: JetBrains Mono
    style: Bold Italic
  size: 12
  offset:
    x: 0
    y: 4
  glyph_offset:
    x: 0
    y: 2
colors:
  primary:
    background: '0x1d2021'
    foreground: '0xebdbb2'
  normal:
    black:   '0x282828'
    red:     '0xcc241d'
    green:   '0x98971a'
    yellow:  '0xd79921'
    blue:    '0x458588'
    magenta: '0xb16286'
    cyan:    '0x689d6a'
    white:   '0xa89984'
  bright:
    black:   '0x928374'
    red:     '0xfb4934'
    green:   '0xb8bb26'
    yellow:  '0xfabd2f'
    blue:    '0x83a598'
    magenta: '0xd3869b'
    cyan:    '0x8ec07c'
    white:   '0xebdbb2'
key_bindings:
  - { key: V,     mods: Control|Shift, action: Paste            }
  - { key: C,     mods: Control|Shift, action: Copy             }
  - { key: Key0,  mods: Control,       action: ResetFontSize    }
  - { key: Plus,  mods: Control,       action: IncreaseFontSize }
  - { key: Minus, mods: Control,       action: DecreaseFontSize }
