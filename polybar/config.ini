[colors]
bg = #000000
fg = #ebdbb2

[bar/phamhiep]
font-0 = "JetBrains Mono:pixelsize=11;2"
font-1 = "JetBrainsMono Nerd Font Mono:pixelsize=18;4"

width = 100%
height = 25px

padding-left = 5px
padding-right = 5px

background = ${colors.bg}
foreground = ${colors.fg}

module-margin = 5px

separator = |

tray-position = right

modules-left = bspwm
modules-right = network cpu memory volume battery date

[module/bspwm]
type = internal/bspwm

enable-scroll = false

ws-icon-default = 

label-focused = 
label-focused-padding = 2px

label-occupied = 
label-occupied-padding = 2px

label-urgent = 
label-urgent-padding = 2px

label-empty = 
label-empty-padding = 2px

[module/network]
type = internal/network

interface = wlp2s0
interface-type = wireless

label-connected = NET: %upspeed% %downspeed%

[module/cpu]
type = internal/cpu
label = CPU: %percentage%%

[module/memory]
type = internal/memory
label = RAM: %percentage_used%%

[module/volume]
type = custom/script

interval = 1

exec = pamixer --get-volume

label = VOL: %output%%

click-left = pamixer --toggle-mute

scroll-up = pamixer --increase 5
scroll-down = pamixer --decrease 5

[module/battery]
type = internal/battery

battery = BAT0

label-charging = BAT: +%percentage%%
label-discharging = BAT: -%percentage%%

[module/date]
type = internal/date

time = %H:%M

label = %time%
label-font = 0
